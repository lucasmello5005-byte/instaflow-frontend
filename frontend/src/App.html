<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaFlow — SaaS Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ──────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090d;--surface:#0f1018;--s2:#171923;--s3:#1e2130;
  --border:#252838;--border2:#2e3347;
  --accent:#f97316;--accent2:#fb923c;--accent-glow:rgba(249,115,22,0.15);
  --blue:#3b82f6;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --purple:#8b5cf6;
  --text:#f1f2f7;--muted:#6b7280;--muted2:#9ca3af;
  --font:'Bricolage Grotesque',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Scrollbar ─────────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Layout ────────────────────────────────────────────────────────────────── */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:50;transition:transform .3s}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.content{padding:32px;flex:1}

/* ── Sidebar ───────────────────────────────────────────────────────────────── */
.logo-area{padding:24px 20px;border-bottom:1px solid var(--border)}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.logo-tag{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

.nav{padding:16px 10px;flex:1;overflow-y:auto}
.nav-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--muted2);margin-bottom:1px;transition:all .15s;border:1px solid transparent;text-decoration:none}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(249,115,22,.12),rgba(249,115,22,.06));color:var(--accent);border-color:rgba(249,115,22,.2)}
.nav-icon{width:16px;text-align:center;flex-shrink:0;font-size:15px}
.nav-badge{margin-left:auto;background:var(--accent);color:white;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}

.sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
.plan-badge{background:linear-gradient(135deg,var(--s3),var(--s2));border:1px solid var(--border2);border-radius:10px;padding:12px;cursor:pointer;transition:border-color .2s}
.plan-badge:hover{border-color:var(--accent)}
.plan-name{font-size:12px;font-weight:700;color:var(--accent)}
.plan-desc{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Topbar ────────────────────────────────────────────────────────────────── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar-left h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.topbar-left p{font-size:12px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;gap:10px;align-items:center}

/* ── Buttons ───────────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .2s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(249,115,22,.35)}
.btn-ghost{background:var(--s2);color:var(--text);border:1px solid var(--border2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{padding:8px;border-radius:8px}

/* ── Cards ─────────────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:700}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.card-body{padding:22px}

/* ── Stat cards ────────────────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;cursor:default}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.stat-card::after{content:'';position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;opacity:.08}
.stat-card:nth-child(1)::after{background:var(--accent)}
.stat-card:nth-child(2)::after{background:var(--green)}
.stat-card:nth-child(3)::after{background:var(--blue)}
.stat-card:nth-child(4)::after{background:var(--purple)}
.stat-icon{font-size:20px;margin-bottom:14px}
.stat-value{font-size:26px;font-weight:800;letter-spacing:-1px}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.stat-delta{font-size:11px;margin-top:8px;font-weight:600}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}

/* ── Grid layouts ──────────────────────────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-main{display:grid;grid-template-columns:1fr 320px;gap:20px}

/* ── Forms ─────────────────────────────────────────────────────────────────── */
.form-group{margin-bottom:16px}
.label{display:block;font-size:11px;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;font-weight:600}
.input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:9px;padding:10px 14px;color:var(--text);font-family:var(--font);font-size:13.5px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--muted)}
textarea.input{resize:vertical;min-height:80px;line-height:1.6}
select.input option{background:var(--s2)}

/* ── Upload zone ───────────────────────────────────────────────────────────── */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--s2)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(249,115,22,.05)}
.upload-icon{font-size:28px;margin-bottom:8px}
.upload-text{font-size:13px;color:var(--muted2)}
.upload-hint{font-size:11px;color:var(--muted);margin-top:4px}

/* ── Tags ──────────────────────────────────────────────────────────────────── */
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--s2);border:1px solid var(--border2);border-radius:9px;min-height:42px;cursor:text}
.tag{background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.25);color:var(--accent);border-radius:6px;padding:3px 9px;font-size:12px;display:flex;align-items:center;gap:5px}
.tag-x{cursor:pointer;opacity:.6;transition:opacity .2s}
.tag-x:hover{opacity:1}
.tag-input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13px;flex:1;min-width:80px}

/* ── Post queue ────────────────────────────────────────────────────────────── */
.post-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border)}
.post-item:last-child{border-bottom:none}
.post-thumb{width:46px;height:46px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.post-thumb img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.post-info{flex:1;min-width:0}
.post-caption{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:10px}
.post-actions{display:flex;gap:6px;flex-shrink:0}

/* ── Status badges ─────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;flex-shrink:0}
.badge-scheduled{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.badge-published{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.badge-failed{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.badge-publishing{background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.badge-pro{background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(249,115,22,.15));color:#c084fc;border:1px solid rgba(139,92,246,.2)}

/* ── Account card ──────────────────────────────────────────────────────────── */
.account-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;transition:border-color .2s}
.account-card:hover{border-color:var(--border2)}
.account-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.account-avatar img{width:100%;height:100%;object-fit:cover}
.account-info{flex:1;min-width:0}
.account-name{font-size:13.5px;font-weight:700}
.account-stats{font-size:11px;color:var(--muted);margin-top:2px}
.account-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-active{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-warning{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}

/* ── Product card ──────────────────────────────────────────────────────────── */
.product-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,border-color .2s;cursor:pointer}
.product-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.product-img{width:100%;aspect-ratio:1;background:linear-gradient(135deg,var(--s3),var(--border));display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-info{padding:12px}
.product-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-price{font-size:16px;font-weight:800;color:var(--accent);margin-top:4px}
.product-category{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Analytics ─────────────────────────────────────────────────────────────── */
.metric-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.metric-row:last-child{border-bottom:none}
.metric-label{font-size:13px;color:var(--muted2)}
.metric-value{font-size:15px;font-weight:700}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:4px;transition:width 1s ease}

/* ── Pricing ───────────────────────────────────────────────────────────────── */
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:860px;margin:0 auto}
.pricing-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;text-align:center;transition:transform .2s,border-color .2s;position:relative;overflow:hidden}
.pricing-card.featured{border-color:var(--accent);background:linear-gradient(135deg,rgba(249,115,22,.06),var(--surface))}
.pricing-card.featured::before{content:'MAIS POPULAR';position:absolute;top:14px;right:-28px;background:var(--accent);color:white;font-size:9px;font-weight:800;padding:4px 36px;transform:rotate(45deg);letter-spacing:1px}
.pricing-card:hover{transform:translateY(-4px)}
.price-name{font-size:13px;font-weight:700;color:var(--muted2);letter-spacing:1px;text-transform:uppercase}
.price-amount{font-size:40px;font-weight:800;letter-spacing:-2px;margin:12px 0 4px}
.price-amount span{font-size:16px;font-weight:400;color:var(--muted)}
.price-period{font-size:12px;color:var(--muted);margin-bottom:20px}
.price-features{list-style:none;text-align:left;margin-bottom:24px}
.price-features li{font-size:13px;color:var(--muted2);padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.price-features li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0}

/* ── Modal ─────────────────────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;animation:modalIn .25s ease-out}
.modal-lg{max-width:760px}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:22px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:var(--s2);border:1px solid var(--border);color:var(--muted2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{color:var(--text);border-color:var(--border2)}
.modal-body{padding:24px}

/* ── Toast ─────────────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--s3);border:1px solid var(--border2);border-radius:12px;padding:13px 18px;font-size:13px;z-index:999;display:flex;align-items:center;gap:10px;max-width:340px;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(16,185,129,.3)}
.toast.error{border-color:rgba(239,68,68,.3)}

/* ── Auth pages ────────────────────────────────────────────────────────────── */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px}
.auth-logo{font-size:26px;font-weight:800;text-align:center;margin-bottom:8px}
.auth-logo span{color:var(--accent)}
.auth-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:32px}
.auth-divider{text-align:center;color:var(--muted);font-size:12px;margin:16px 0;position:relative}
.auth-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
.auth-divider span{background:var(--surface);padding:0 12px;position:relative}
.auth-link{color:var(--accent);cursor:pointer;text-decoration:none}
.auth-link:hover{text-decoration:underline}

/* ── Preview phone ─────────────────────────────────────────────────────────── */
.ig-preview{border:2px solid var(--border2);border-radius:16px;overflow:hidden;background:var(--s2);max-width:280px}
.ig-prev-header{padding:10px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.ig-prev-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple))}
.ig-prev-name{font-size:12px;font-weight:600}
.ig-prev-img{width:100%;aspect-ratio:1;background:linear-gradient(135deg,var(--s3),var(--border));display:flex;align-items:center;justify-content:center;font-size:48px}
.ig-prev-img img{width:100%;height:100%;object-fit:cover}
.ig-prev-footer{padding:12px}
.ig-prev-actions{font-size:18px;display:flex;gap:12px;margin-bottom:8px}
.ig-prev-caption{font-size:11px;color:var(--muted2);line-height:1.5}

/* ── Misc ──────────────────────────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:20px 0}
.empty{text-align:center;padding:48px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px;font-weight:600;margin-bottom:6px}
.empty-sub{font-size:12px}
.loader{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.flex{display:flex}.flex-c{display:flex;align-items:center}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mt-4{margin-top:16px}.mt-6{margin-top:24px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
.w-full{width:100%}.text-sm{font-size:13px}.text-xs{font-size:11px}.text-muted{color:var(--muted)}.fw-700{font-weight:700}
.overflow-scroll{overflow-y:auto;max-height:420px}
.section-title{font-size:18px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:24px}

/* ── AI chip ───────────────────────────────────────────────────────────────── */
.ai-chip{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(249,115,22,.1));border:1px solid rgba(139,92,246,.25);border-radius:20px;padding:3px 10px;font-size:11px;color:#c084fc;font-weight:600;letter-spacing:.3px}
.ai-chip::before{content:'✦'}

/* Responsive */
@media(max-width:1100px){.stats-grid{grid-template-columns:repeat(2,1fr)}.grid-main{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.main{margin-left:0}.content{padding:16px}.stats-grid{grid-template-columns:1fr 1fr}}
</style>

// ── Helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => n >= 1000 ? (n/1000).toFixed(1)+'K' : n;
const fmtBRL = n => `R$ ${n.toFixed(2).replace('.',',')}`;
const fmtDate = s => new Date(s).toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

function render() {
  $('root').innerHTML = buildApp();
  attachEvents();
  drawChart();
}

function buildApp() {
  if (state.page === 'login')    return buildLogin();
  if (state.page === 'register') return buildRegister();
  return `
    <div class="app">
      ${buildSidebar()}
      <div class="main">
        ${buildTopbar()}
        <div class="content">
          ${buildPage()}
        </div>
      </div>
    </div>
    ${state.modal ? buildModal() : ''}
    <div class="toast ${state.toast ? 'show ' + state.toast.type : ''}" id="toast">
      ${state.toast ? state.toast.msg : ''}
    </div>
  `;
}

// ── Pages ─────────────────────────────────────────────────────────────────────
function buildPage() {
  switch(state.page) {

// ── Chart ────────────────────────────────────────────────────────────────────
function drawChart() {
  const canvas = document.getElementById('main-chart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const data = state.analytics.chart;
  const W = canvas.offsetWidth || 600;
  const H = canvas.height;
  canvas.width = W;

  const pad = { t:10, r:20, b:30, l:40 };
  const cW = W - pad.l - pad.r;
  const cH = H - pad.t - pad.b;
  const maxImp = Math.max(...data.map(d=>d.imp)) * 1.15;

  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for(let i=0;i<=4;i++) {
    const y = pad.t + (cH/4)*i;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
  }

  const sx = (i) => pad.l + (cW/(data.length-1))*i;
  const sy = (v) => pad.t + cH - (v/maxImp)*cH;

  // Impressions gradient fill
  const grad = ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,'rgba(249,115,22,0.25)');
  grad.addColorStop(1,'rgba(249,115,22,0)');
  ctx.beginPath();
  ctx.moveTo(sx(0), sy(data[0].imp));
  data.forEach((d,i)=>{ if(i>0) ctx.lineTo(sx(i),sy(d.imp)); });
  ctx.lineTo(sx(data.length-1), H-pad.b);
  ctx.lineTo(sx(0), H-pad.b);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Impressions line
  ctx.beginPath();
  ctx.strokeStyle = 'var(--accent)'; ctx.lineWidth = 2;
  data.forEach((d,i) => { i===0?ctx.moveTo(sx(i),sy(d.imp)):ctx.lineTo(sx(i),sy(d.imp)); });
  ctx.stroke();

  // Dots + labels
  data.forEach((d,i) => {
    ctx.beginPath();ctx.arc(sx(i),sy(d.imp),4,0,Math.PI*2);
    ctx.fillStyle='var(--accent)';ctx.fill();
    ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--bg');
    ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px Bricolage Grotesque,sans-serif';
    ctx.textAlign='center';ctx.fillText(d.d,sx(i),H-8);
  });
}

window.addTag = (e, containerId, inputId) => {
  if (e.key !== 'Enter') return;
  const input = $(inputId);
  let val = input.value.trim();
  if (!val) return;
  if (!val.startsWith('#')) val = '#'+val;
  const tag = document.createElement('span');
  tag.className='tag';
  tag.innerHTML=`${val} <span class="tag-x" onclick="this.parentElement.remove()">×</span>`;
  $(containerId).insertBefore(tag, input);
  input.value='';
};

window.handleFilePreview = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const prev = $('m-prev-img');
    if (prev && file.type.startsWith('image')) prev.innerHTML=`<img src="${ev.target.result}">`;
    $('m-upload').querySelector('.upload-icon').textContent='✅';
    $('m-upload').querySelector('.upload-text').textContent=file.name;
  };
  reader.readAsDataURL(file);
};

  const e = $('l-email')?.value; const p = $('l-pass')?.value;
  if (!e||!p) { showToast('Preencha email e senha','error'); return; }
  state.user = { name:'João Silva', email:e, plan:'pro' };
  state.page = 'dashboard';
  render();
};

window.doRegister = () => {
  const n=$('r-name')?.value,e=$('r-email')?.value,p=$('r-pass')?.value;
  if(!n||!e||!p){showToast('Preencha todos os campos','error');return;}
  state.user={name:n,email:e,plan:'free'};
  state.page='dashboard';
  render();
};

function showToast(msg, type='success') {
  state.toast = {msg, type};
  render();
  setTimeout(() => { state.toast=null; render(); }, 3500);
}

function attachEvents() {
  const capInput = document.getElementById('m-caption');
  if (capInput) {
    capInput.addEventListener('input', () => {
      const prev = $('m-prev-cap');
      if (prev) prev.textContent = capInput.value || 'Legenda aparecerá aqui...';
    });
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
window.addEventListener('resize', drawChart);
</script>
</body>
</html>
